name: CI

on:
  push:
    branches:
      - main
  pull_request:

permissions:
  actions: read
  contents: read

jobs:
  main:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.1

      # Setup Node.js
      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - run: bun install --frozen-lockfile
      - uses: nrwl/nx-set-shas@v4

      # run-many, NOT affected: this is a single-package repo, and later steps
      # (readme-check, type-contract-check) hard-depend on packages/node/dist
      # existing — an e2e-/docs-only commit under `affected` would skip the
      # build and fail them on a missing dist.
      - run: bunx nx run-many -t lint typecheck build
      - run: bun run typecheck:spec
      - run: bun test
      - run: bun run readme-check
      - run: bun run type-contract-check
