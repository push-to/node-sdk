name: CI

on:
  push:
    branches:
      - main
  pull_request:

permissions:
  actions: read
  contents: read

jobs:
  main:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.1

      # Setup Node.js
      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - run: bun install --frozen-lockfile
      - uses: nrwl/nx-set-shas@v4

      # run-many, NOT affected: this is a single-package repo, and later steps
      # (readme-check, type-contract-check) hard-depend on packages/node/dist
      # existing — an e2e-/docs-only commit under `affected` would skip the
      # build and fail them on a missing dist.
      # No project defines a lint target — listing it made a silent no-op leg
      # that read as coverage. Formatting enforcement (prettier --check) is a
      # deliberate future decision, not a fake green.
      - run: bunx nx run-many -t typecheck build
      - run: bun run typecheck:spec
      - run: bun test
      - run: bun run readme-check
      - run: bun run type-contract-check
      # T-N1-011 F2 — a node16-moduleResolution probe that resolves
      # @push-to/node through a REAL workspace:* dependency (not a tsconfig
      # `paths` override), so a regression in the "exports" map's
      # require/import "types" wiring fails CI with TS1479 instead of
      # silently shipping again.
      - run: bun run cjs-types-probe
