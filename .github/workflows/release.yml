name: Release

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      tag:
        description: 'Existing git tag to (re)publish to npm, e.g. v0.1.0. Recovery path for releases that were tagged but failed to publish.'
        required: true
        type: string

permissions:
  contents: write
  issues: write
  pull-requests: write
  id-token: write

jobs:
  release:
    name: Release
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.1

      # npm >= 11.5.1 is required for OIDC trusted publishing (no NPM_TOKEN).
      # The npmjs.com trusted publisher for @push-to/node must
      # reference this repo + this workflow file (release.yml).
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      # node 24 bundles npm >= 11.5.1, which supports OIDC trusted publishing.
      # Do NOT `npm install -g npm@latest` here: overwriting npm's own install
      # tree mid-flight prunes modules (sigstore) and breaks provenance.
      - name: Assert npm supports trusted publishing (>= 11.5.1)
        run: |
          npm --version
          node -e "const v=require('child_process').execSync('npm --version').toString().trim().split('.').map(Number); if (v[0]<11 || (v[0]===11 && (v[1]<5 || (v[1]===5 && v[2]<1)))) { console.error('npm ' + v.join('.') + ' too old for trusted publishing'); process.exit(1); }"

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build package
        run: bun run build

      - name: Run tests
        run: bun test

      - name: README + type-contract compile-proof
        run: |
          bun run readme-check
          bun run type-contract-check

      - name: Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: bunx semantic-release

  # Manual recovery: publish an already-tagged version whose npm publish failed
  # (semantic-release skips tags that exist, so a plain re-run can't recover).
  publish-tag:
    name: Publish existing tag to npm
    if: github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout tag
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.tag }}
          persist-credentials: false

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.1

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      # node 24 bundles npm >= 11.5.1, which supports OIDC trusted publishing.
      # Do NOT `npm install -g npm@latest` here: overwriting npm's own install
      # tree mid-flight prunes modules (sigstore) and breaks provenance.
      - name: Assert npm supports trusted publishing (>= 11.5.1)
        run: |
          npm --version
          node -e "const v=require('child_process').execSync('npm --version').toString().trim().split('.').map(Number); if (v[0]<11 || (v[0]===11 && (v[1]<5 || (v[1]===5 && v[2]<1)))) { console.error('npm ' + v.join('.') + ' too old for trusted publishing'); process.exit(1); }"

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build package
        run: bun run build

      - name: Verify tag matches package version
        run: |
          PKG_VERSION=$(node -p "require('./packages/node/package.json').version")
          if [ "v${PKG_VERSION}" != "${{ inputs.tag }}" ]; then
            echo "Tag ${{ inputs.tag }} does not match package version v${PKG_VERSION}" >&2
            exit 1
          fi

      - name: Publish
        run: cd packages/node && npm publish --access public --tag latest
